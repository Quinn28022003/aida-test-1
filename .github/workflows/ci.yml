name: CI/CD

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - '**'
  push:
    branches:
      - master
      - staging
      - develop
      - rewrite

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Lint
        run: pnpm lint

      - name: Check types
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test:coverage

      - name: Report Coverage
        if: github.event_name == 'pull_request' && always()
        uses: davelosert/vitest-coverage-report-action@v2

      - name: Build
        run: pnpm build

  database-dry-run:
    name: Database dry run (migrations + RLS on ephemeral Postgres)
    runs-on: ubuntu-latest
    needs: [validate]
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (github.ref_name == 'develop' || github.ref_name == 'rewrite' || github.ref_name == 'main' || github.ref_name == 'staging'))

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db?sslmode=disable
      RLS_TEST_DATABASE_URL: postgresql://rls_ci:rls_ci@localhost:5432/test_db?sslmode=disable
      NEXT_PUBLIC_SUPABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db?sslmode=disable
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply Supabase dependency stubs (auth, storage)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f supabase/ci/mock_supabase_minimal.sql

      - name: Run migrations on temporary Postgres
        run: pnpm exec supabase db push --db-url "$DATABASE_URL" --yes --debug

      - name: Smoke generate database types from temporary Postgres
        run: |
          pnpm exec supabase gen types typescript \
            --db-url "$DATABASE_URL" \
            --schema public \
            > /tmp/database-generated.types.ts

      - name: Apply RLS policies via ephemeral Supabase migration
        run: pnpm rls:sync

      - name: RLS integration tests (fixtures + cleanup in runner)
        run: pnpm rls:test

  deploy-database-staging:
    name: Deploy database (staging)
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'push' && github.ref_name == 'staging'
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Show target database environment
        run: echo "Deploying database migrations to staging"

      - name: Link Supabase project
        run: pnpm exec supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push database migrations
        run: pnpm migrate:up

      - name: Apply RLS policies (ephemeral migration)
        run: pnpm rls:sync

      - name: Show migration status
        run: pnpm migrate:status

  deploy-database-master:
    name: Deploy database (master)
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'push' && github.ref_name == 'master'
    environment: master
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Show target database environment
        run: echo "Deploying database migrations to master"

      - name: Link Supabase project
        run: pnpm exec supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push database migrations
        run: pnpm migrate:up

      - name: Apply RLS policies (ephemeral migration)
        run: pnpm rls:sync

      - name: Show migration status
        run: pnpm migrate:status

  database-type-validate-staging:
    name: Database type validate (staging)
    runs-on: ubuntu-latest
    needs: [deploy-database-staging]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref_name == 'staging' &&
      needs.deploy-database-staging.result == 'success'
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Validate database generated types
        run: |
          pnpm exec supabase gen types typescript \
            --project-id "$SUPABASE_PROJECT_REF" \
            --schema public \
            > /tmp/database-generated.types.ts
          sed '/PostgrestVersion:/d' packages/db/src/database-generated.types.ts \
            > /tmp/database-generated.types.repo.ts
          sed '/PostgrestVersion:/d' /tmp/database-generated.types.ts \
            > /tmp/database-generated.types.normalized.ts
          diff -u \
            /tmp/database-generated.types.repo.ts \
            /tmp/database-generated.types.normalized.ts

  database-type-validate-master:
    name: Database type validate (master)
    runs-on: ubuntu-latest
    needs: [deploy-database-master]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref_name == 'master' &&
      needs.deploy-database-master.result == 'success'
    environment: master
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Validate database generated types
        run: |
          pnpm exec supabase gen types typescript \
            --project-id "$SUPABASE_PROJECT_REF" \
            --schema public \
            > /tmp/database-generated.types.ts
          sed '/PostgrestVersion:/d' packages/db/src/database-generated.types.ts \
            > /tmp/database-generated.types.repo.ts
          sed '/PostgrestVersion:/d' /tmp/database-generated.types.ts \
            > /tmp/database-generated.types.normalized.ts
          diff -u \
            /tmp/database-generated.types.repo.ts \
            /tmp/database-generated.types.normalized.ts
